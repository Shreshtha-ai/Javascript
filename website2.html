<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body style = "background-color: #212121; color: white;">
    <div class = "parent">
        <div class = "day">Monday</div>
        <div class = "day">Tuesday</div>
        <div class = "day">Wednesday</div>
        <div class = "day">Thursday</div>
        <div class = "day">Friday</div>
        <div class = "day">Saturday</div>
        <div class = "day">Sunday</div>                   
    </div>
</body>
<script>
    const parent = document.querySelector('.parent');
    console.log(parent);
    console.log(parent.children)
    console.log(parent.children[0].innerHTML)
    for (let i = 0; i < parent.children.length; i++) {
        console.log(parent.children[i].innerHTML);
        
    }
    parent.children[1].style.color = "orange"

    const dayOne = document.querySelector('.day');
    console.log(dayOne); 
    console.log(dayOne.parentElement) //going from child element to parent element 
    console.log(dayOne.nextElementSibling) // going from current element to next element

    console.log("Nodes:", parent.childNodes);

    // nodes are just like nodes that are present in the DOM 

    
</script>
</html>
